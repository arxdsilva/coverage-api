services:
  db:
    image: postgres:18
    container_name: coverage-api-db
    environment:
      POSTGRES_USER: coverage
      POSTGRES_PASSWORD: coverage
      POSTGRES_DB: coverage
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres18_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coverage -d coverage"]
      interval: 5s
      timeout: 5s
      retries: 10

  # DEV ONLY: remove this service before production deployment.
  seed:
    image: postgres:18
    container_name: coverage-api-seed
    working_dir: /app
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: coverage
    entrypoint: ["sh", "-c"]
    command:
      - psql "postgres://coverage:coverage@db:5432/coverage?sslmode=disable" -v ON_ERROR_STOP=1 -f /app/seeds/001_seed.sql
    restart: "no"

  api:
    image: golang:1.25-alpine
    container_name: coverage-api-app
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      SERVER_ADDR: :8080
      API_KEY_HEADER: X-API-Key
      API_KEY_SECRET: dev-local-key
      DATABASE_URL: postgres://coverage:coverage@db:5432/coverage?sslmode=disable
      SHUTDOWN_TIMEOUT_SECONDS: "10"
    depends_on:
      db:
        condition: service_healthy
    command: ["go", "run", "./cmd/api"]
    ports:
      - "8080:8080"

  frontend:
    image: golang:1.25-alpine
    container_name: coverage-api-frontend
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      FRONTEND_ADDR: :8090
      API_BASE_URL: http://api:8080
      API_KEY_HEADER: X-API-Key
      API_KEY_SECRET: dev-local-key
    depends_on:
      api:
        condition: service_started
    command: ["go", "run", "./cmd/frontend"]
    ports:
      - "8090:8090"

volumes:
  postgres18_data:
